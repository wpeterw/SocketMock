name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint code
        run: uv run ruff check .

      - name: Check typing
        run: uv run ty check .

      - name: Run tests with coverage
        run: uv run pytest --cov=socketmock --cov-report=term-missing --cov-report=xml

      - name: Update coverage badge
        run: python .github/scripts/update_coverage_badge.py coverage.xml .github/badges/coverage.svg

      - name: Commit coverage badge update
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.svg
          if git diff --cached --quiet; then
            echo "Coverage badge already up to date"
          else
            git commit -m "Update coverage badge"
            git push
          fi
